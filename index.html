<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://api.fontshare.com/v2/css?f[]=clash-grotesk@400,500&display=swap"
      rel="stylesheet"
    />
    <title>Henry's Cocktail Bar</title>
    <script>
      const theme = localStorage.getItem("theme");
      if (theme === "dark") document.documentElement.setAttribute("data-theme", "dark");
    </script>
  </head>
  <body>
    <a
      class="instagram-link"
      href="https://www.instagram.com/henrys.cocktailbar/"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Instagram"
    >
      <svg
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <rect x="2" y="2" width="20" height="20" rx="5" />
        <circle cx="12" cy="12" r="5" />
        <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none" />
      </svg>
    </a>

    <main>
      <section class="content">
        <div class="logo" role="img" aria-label="Henry's Cocktail Bar"></div>
        <nav>
          <a href="#reservations">RESERVATIONS</a>
        </nav>
      </section>

      <button class="illustration" type="button" aria-label="Toggle theme">
        <div class="room"></div>
      </button>
    </main>

    <section id="reservations" class="reservations">
      <p>Call us for a good time!</p>
      <p>(or just to reserve a table)</p>
      <p class="reservations-phone"><a href="tel:+34933007695">+34 93 30 07 695</a></p>
    </section>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
